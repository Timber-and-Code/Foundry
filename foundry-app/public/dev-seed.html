<!doctype html>
<meta charset="utf-8">
<title>Dev seed</title>
<body style="font-family:system-ui;background:#141414;color:#eee;padding:24px">
<h1>Seeding dev profile...</h1>
<pre id="log"></pre>
<script>
  var log = document.getElementById('log');
  function l(m) { log.textContent += m + '\n'; }
  try {
    var profile = {
      name: 'Test',
      experience: 'intermediate',
      age: 30,
      gender: 'male',
      weight: 180,
      goal: 'hypertrophy',
      mesoLength: 6,
      sessionDuration: 60,
      equipment: ['barbell','dumbbell','cable','machine','bodyweight','band','kettlebell'],
      splitType: 'ppl',
      daysPerWeek: 3,
      workoutDays: [1,3,5],
      startDate: new Date().toISOString().slice(0,10),
      birthdate: '1995-01-01'
    };
    localStorage.setItem('foundry:profile', JSON.stringify(profile));
    localStorage.setItem('foundry:onboarded', '1');
    localStorage.removeItem('foundry:storedProgram');
    // Nuke any Supabase auth so cloud pull can't restore a poisoned meso
    var toRemove = [];
    for (var i = 0; i < localStorage.length; i++) {
      var k = localStorage.key(i);
      if (k && (k.indexOf('sb-') === 0 || k.indexOf('supabase') !== -1)) toRemove.push(k);
    }
    toRemove.forEach(function(k) { localStorage.removeItem(k); });
    l('Profile seeded.');
    l('onboarded = 1');
    l('storedProgram cleared');
    l('supabase auth cleared: ' + toRemove.length + ' keys');
    l('');
    l('Redirecting to / in 1s...');
    setTimeout(function() { location.href = '/'; }, 1000);
  } catch (e) {
    l('ERROR: ' + e.message);
  }
</script>
</body>
