name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: foundry-app/package-lock.json

      - name: Install dependencies
        working-directory: foundry-app
        run: npm ci

      - name: Lint
        working-directory: foundry-app
        run: npm run lint

      - name: Test
        working-directory: foundry-app
        run: npm test

      - name: Build
        working-directory: foundry-app
        run: npm run build
