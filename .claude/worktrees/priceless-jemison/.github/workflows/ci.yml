name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: foundry-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: foundry-app/package-lock.json
      - run: npm install --no-audit --no-fund
      - run: npm run lint
      - run: npx tsc --noEmit
      - run: npm run test:coverage
