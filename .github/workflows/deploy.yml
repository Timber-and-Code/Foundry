name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: foundry-app/package-lock.json

      - name: Install dependencies
        working-directory: foundry-app
        run: npm install --no-audit --no-fund

      - name: Build
        working-directory: foundry-app
        env:
          VITE_SUPABASE_URL: https://iwresyrdyalwkowyxxwr.supabase.co
          VITE_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml3cmVzeXJkeWFsd2tvd3l4eHdyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxNDI5NDAsImV4cCI6MjA5MDcxODk0MH0.VNpTfui51QnB5UZ6fDZKTzI6oCXasEl8WGlNHZv0lc0
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: foundry-app/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
